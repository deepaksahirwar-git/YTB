services:
  - type: web
    name: shortswave-ai
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MAX_UPLOAD_MB
        value: "750"
      - key: GEMINI_API_KEY
        sync: false
